<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projekt</title>
  <meta name="description" content="Projekt Website" />
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f3ee;
      color: #17120f;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(920px, 100%);
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 28px;
      padding: clamp(32px, 7vw, 88px);
      box-shadow: 0 24px 80px rgba(0,0,0,.08);
    }
    .eyebrow {
      letter-spacing: .22em;
      text-transform: uppercase;
      font-size: 12px;
      color: #8a6a4d;
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(44px, 9vw, 96px);
      line-height: .92;
      margin: 0 0 24px;
      font-weight: 700;
    }
    p {
      max-width: 620px;
      font-size: clamp(18px, 2.4vw, 24px);
      line-height: 1.5;
      margin: 0 0 32px;
      color: #42362e;
    }
    a {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #17120f;
      color: white;
      text-decoration: none;
      padding: 14px 22px;
      font-weight: 650;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">GitHub Pages</div>
    <h1>Projekt ist live.</h1>
    <p>Diese Startseite wurde automatisch bereitgestellt. Du kannst sie später mit deinem Shop, deiner Marke oder einer Landingpage ersetzen.</p>
    <a href="https://github.com/nicofrommer-web/Projekt">Repository öffnen</a>
  </main>
</body>
</html>
